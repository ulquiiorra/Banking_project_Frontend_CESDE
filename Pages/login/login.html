<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Hapibank Digital Vault</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"/>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"/>
      <link rel="stylesheet" href="../../css/global-background.css" />
    <link rel="stylesheet" href="login.css" />
    <script type="module" src="login.js" defer></script>
    <link rel="stylesheet" href="../../components/navigation/navigation.css">
    <script src="../../components/navigation/navigation.js" defer></script>
    <link rel="stylesheet" href="../../components/footer/footer.css">
    <script src="../../components/footer/footer.js" defer></script>
  </head>
  <body class="dark-theme">
  <!-- Global Background Elements -->
  <div class="cyber-grid"></div>
  <div class="glow-sphere top-left"></div>
  <div class="glow-sphere bottom-right"></div>
  <div class="floating-geometry geo-1"></div>
  <div class="floating-geometry geo-2"></div>

  <header id="nav-placeholder">

  </header>

    <main class="login-container">
      <div class="login-card glass-panel aura-glow">
        <div class="accent-line"></div>

        <div class="login-header">
          <div class="logo-wrapper">
            <img
              src="../../img/logoD.png"
              alt="Hapibank Logo"
              class="main-logo"
            />
          </div>
          <p class="label-xs">Digital Alchemy Vault</p>
        </div>

        <form id="login-form" class="auth-form">
          <div class="field-group">
            <label for="email" class="field-label">Correo Electrónico</label>
            <div class="input-container">
              <span class="material-symbols-outlined input-icon"
                >alternate_email</span>
              <input
                type="email"
                id="email"
                placeholder="nombre@ejemplo.com"
                required
              />
            </div>
          </div>

          <div class="field-group">
            <label for="password" class="field-label">Contraseña</label>
            <div class="input-container">
              <span class="material-symbols-outlined input-icon">lock</span>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
              <button type="button" class="toggle-password" id="pass-toggle">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>

          <div class="form-options">
            <a href="#" class="forgot-link">Olvidé mi contraseña</a>
          </div>

          <div id="error-message" class="error-container" style="display: none">
            <span class="material-symbols-outlined">error</span>
            <p id="error-text"></p>
          </div>

          <button type="submit" class="btn-login-gradient">
            <span>Iniciar Sesión</span>
          </button>
        </form>
      </div>
    </main>

     <div id="footer-placeholder"></div>
  </body>
</html>
