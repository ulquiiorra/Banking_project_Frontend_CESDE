<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hapibank | Transfers</title>
    <link rel="icon" type="image/png" href="../../img/favicon.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="transferencia.css">
    <script type="module" src="transferencia.js" defer></script>
    <link rel="stylesheet" href="/css/global-background.css">
    <link rel="stylesheet" href="../../components/navigation/navigation.css">
    <script src="../../components/navigation/navigation.js" defer></script>
    <link rel="stylesheet" href="../../components/footer/footer.css">
    <script src="../../components/footer/footer.js" defer></script>
</head>

<body class="dark-theme">
    <!-- Global Background Elements -->
    <div class="cyber-grid"></div>
    <div class="glow-sphere top-left"></div>
    <div class="glow-sphere bottom-right"></div>
    <div class="floating-geometry geo-1"></div>
    <div class="floating-geometry geo-2"></div>

    <header id="nav-placeholder">
    </header>

    <main class="content-wrapper">
        <section class="selection-section">
            <div class="section-header">
                <h2>Origin Account</h2>
                <span class="badge">Select Source</span>
            </div>
            <div id="origin-accounts" class="horizontal-scroll no-scrollbar">
            </div>
        </section>

        <section class="selection-section">
            <div class="tab-container">
                <button id="tab-propias" class="tab active" onclick="window.switchTab('propias')">Mis Cuentas</button>
                <button id="tab-terceros" class="tab" onclick="window.switchTab('terceros')">A Terceros</button>
            </div>

            <div id="destination-list" class="vertical-list">
            </div>

            <div id="destination-input-container" class="hidden" style="margin-top: 1rem;">
                <label class="label-tiny" style="margin-bottom: 0.5rem; display: block;">Número de cuenta
                    destino</label>
                <div class="input-amount-wrapper" style="padding-left: 1rem;">
                    <span class="material-symbols-outlined"
                        style="color: var(--primary-color, #b3fe00); margin-right: 10px;">account_balance</span>
                    <input type="text" id="cuenta-destino-tercero" placeholder="Ej. 987654321" class="input-standard"
                        style="width: 100%; border: none; background: transparent; color: white; outline: none;">
                </div>
            </div>

            <div id="error-container" class="error-box hidden">
                <span class="material-symbols-outlined">error</span>
                <p id="error-message">No puedes transferir a la misma cuenta de origen.</p>
            </div>
        </section>


        <section class="amount-section">
            <label class="label-tiny">Amount to send</label>
            <div class="input-amount-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="transfer-amount" placeholder="0.00" class="input-huge">
            </div>
            <div class="input-concept-wrapper">
                <input type="text" placeholder="Add a concept (Optional)" class="input-standard">
            </div>
        </section>

        <div class="footer-action">
            <button id="confirm-btn" class="btn-primary" disabled>
                Confirmar Transferencia
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>
    </main>
    <div id='footer-placeholder'></div>
    <script type="module" src="transferencia.js" defer></script>
</body>

</html>
